<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="styles.css" rel="stylesheet" />
    <title>Document</title>
  </head>
  <body>
    <div class="temp-wrapper">
      <div id="inputs-container" class="inputs-container">
        <label>BPM</label
        ><input
          id="bpm"
          class="bpm-input"
          type="number"
          min="40"
          max="200"
          value="120"
        />
      </div>
      <div id="volume-container" class="volume-container">
        <label>Volume</label>
        <input
          type="range"
          min="0"
          max="25"
          value="12.5"
          class="volume-slider"
          id="volume"
        />
      </div>
    </div>

    <div class="sequencer-wrapper">
      <div id="volume-slider-container " class="volume-slider-container"></div>
      <div id="grid" class="grid"></div>
    </div>

    <div class="controls-container" id="controls-container"></div>

    <script src="main.js" type="module"></script>
  </body>
</html>
